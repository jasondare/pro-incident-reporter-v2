<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caregiver Incident Reporter</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://pro-incident-reporter-v2-be--pro-incident-reporter.us-east4.hosted.app/incident-reporter-api-config.js"></script>

    <style>
        /* Smooth scrolling */
        html { scroll-behavior: smooth; }
        
        /* Custom loader animation */
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #0891b2; /* Cyan-600 for medical feel */
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-cyan-600 p-2 rounded-lg">
                    <i data-lucide="activity" class="w-6 h-6 text-white"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-900 leading-none">
                    Caregiver Reporter
                    <span class="block text-xs font-normal text-slate-500 mt-1">Mobile Tool</span>
                </h1>
            </div>
            
            <a href="https://incidentreporterpro.com" target="_blank" class="text-sm font-medium text-cyan-600 hover:text-cyan-800 hover:underline transition-colors hidden sm:block">
                incidentreporterpro.com
            </a>
            <a href="https://incidentreporterpro.com" target="_blank" class="sm:hidden text-cyan-600">
                <i data-lucide="globe" class="w-5 h-5"></i>
            </a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-3 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
        
        <div class="lg:col-span-7 space-y-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 px-4 md:px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                    <h2 class="font-semibold text-slate-800 flex items-center gap-2">
                        <i data-lucide="clipboard-plus" class="w-4 h-4 text-cyan-600"></i>
                        New Incident Report
                    </h2>
                </div>
                
                <form id="incidentForm" class="p-4 md:p-6 space-y-5 md:space-y-6">
                    
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-700">Reporting Caregiver</label>
                        <div class="relative">
                            <input type="text" id="caregiverName" required placeholder="e.g. Nurse Joy / Aide Smith"
                                class="w-full pl-10 pr-4 py-3 md:py-2.5 text-base rounded-lg border border-slate-300 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all">
                            <i data-lucide="stethoscope" class="w-5 h-5 text-slate-400 absolute left-3 top-3.5"></i>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-700">Client's Full Name</label>
                            <div class="relative">
                                <input type="text" id="clientName" required placeholder="e.g. Robert Miller"
                                    class="w-full pl-10 pr-4 py-3 md:py-2.5 text-base rounded-lg border border-slate-300 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all">
                                <i data-lucide="user" class="w-5 h-5 text-slate-400 absolute left-3 top-3.5"></i>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-700">Location</label>
                            <div class="relative">
                                <input type="text" id="location" required placeholder="e.g. Room 204 / Private Residence"
                                    class="w-full pl-10 pr-4 py-3 md:py-2.5 text-base rounded-lg border border-slate-300 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all">
                                <i data-lucide="map-pin" class="w-5 h-5 text-slate-400 absolute left-3 top-3.5"></i>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-sm font-medium text-slate-700 flex justify-between">
                            Incident Severity
                            <span class="text-slate-400 font-normal text-xs">1 (Low) - 5 (Critical)</span>
                        </label>
                        <div class="grid grid-cols-5 gap-1.5 md:gap-2">
                            
                            <button type="button" onclick="selectSeverity(1)" id="sev-btn-1"
                                class="severity-btn border-emerald-500 bg-emerald-50 text-emerald-700 relative flex flex-col items-center justify-center p-2 md:p-3 rounded-lg border-2 transition-all active:scale-95 touch-manipulation">
                                <span class="text-lg md:text-xl font-bold">1</span>
                                <span class="text-[9px] md:text-[10px] uppercase tracking-wider font-semibold truncate w-full text-center">Low</span>
                            </button>

                            <button type="button" onclick="selectSeverity(2)" id="sev-btn-2"
                                class="severity-btn border-slate-100 bg-slate-50 text-slate-500 hover:border-slate-300 relative flex flex-col items-center justify-center p-2 md:p-3 rounded-lg border-2 transition-all active:scale-95 touch-manipulation">
                                <span class="text-lg md:text-xl font-bold">2</span>
                                <span class="text-[9px] md:text-[10px] uppercase tracking-wider font-semibold truncate w-full text-center">Mild</span>
                            </button>

                            <button type="button" onclick="selectSeverity(3)" id="sev-btn-3"
                                class="severity-btn border-slate-100 bg-slate-50 text-slate-500 hover:border-slate-300 relative flex flex-col items-center justify-center p-2 md:p-3 rounded-lg border-2 transition-all active:scale-95 touch-manipulation">
                                <span class="text-lg md:text-xl font-bold">3</span>
                                <span class="text-[9px] md:text-[10px] uppercase tracking-wider font-semibold truncate w-full text-center">Mod</span>
                            </button>

                            <button type="button" onclick="selectSeverity(4)" id="sev-btn-4"
                                class="severity-btn border-slate-100 bg-slate-50 text-slate-500 hover:border-slate-300 relative flex flex-col items-center justify-center p-2 md:p-3 rounded-lg border-2 transition-all active:scale-95 touch-manipulation">
                                <span class="text-lg md:text-xl font-bold">4</span>
                                <span class="text-[9px] md:text-[10px] uppercase tracking-wider font-semibold truncate w-full text-center">High</span>
                            </button>

                            <button type="button" onclick="selectSeverity(5)" id="sev-btn-5"
                                class="severity-btn border-slate-100 bg-slate-50 text-slate-500 hover:border-slate-300 relative flex flex-col items-center justify-center p-2 md:p-3 rounded-lg border-2 transition-all active:scale-95 touch-manipulation">
                                <span class="text-lg md:text-xl font-bold">5</span>
                                <span class="text-[9px] md:text-[10px] uppercase tracking-wider font-semibold truncate w-full text-center">Crit</span>
                            </button>
                        </div>
                        <p id="severityDesc" class="text-xs text-slate-500 italic text-center px-2">"Mild confusion, verbal agitation"</p>
                    </div>

                    <div class="cursor-pointer flex items-center justify-between p-3 md:p-4 bg-slate-50 rounded-lg border border-slate-200 select-none" onclick="toggleWitness()">
                        <div class="flex items-center gap-3">
                            <i data-lucide="eye" class="w-5 h-5 text-slate-500"></i>
                            <div>
                                <span class="text-sm font-medium text-slate-700 block">Witnesses present?</span>
                                <span class="text-xs text-slate-500">Family members or other staff</span>
                            </div>
                        </div>
                        <div class="pointer-events-none relative inline-flex items-center">
                            <input type="checkbox" id="witnesses" class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-cyan-600"></div>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-700">Incident Details & Immediate Actions</label>
                        <textarea id="details" required rows="4" placeholder="Describe the behavior, injury, or event..."
                            class="w-full p-3 text-base rounded-lg border border-slate-300 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all resize-none"></textarea>
                    </div>

                    <div class="pt-2">
                        <button type="submit" id="submitBtn"
                            class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-medium py-3.5 px-4 rounded-xl shadow-sm active:scale-[0.98] transition-all flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed touch-manipulation">
                            <i data-lucide="send" class="w-5 h-5 btn-icon"></i>
                            <div class="loader hidden btn-loader"></div>
                            <span class="btn-text">Submit Report</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div id="adviceSection" class="lg:col-span-5 space-y-6 scroll-mt-24 hidden">
            <div class="bg-white rounded-xl shadow-lg border border-cyan-100 overflow-hidden ring-1 ring-cyan-500/20">
                <div class="bg-gradient-to-r from-cyan-600 to-blue-600 px-6 py-4 flex items-center justify-between text-white">
                    <div class="flex items-center gap-3">
                        <i data-lucide="brain-circuit" class="w-6 h-6"></i>
                        <h3 class="font-bold">AI Reporter Recommendations</h3>
                    </div>
                    
                    <button onclick="copyToClipboard()" class="p-2 bg-white/20 hover:bg-white/30 rounded-lg transition-colors flex items-center gap-2 text-xs font-medium backdrop-blur-sm" title="Copy to clipboard">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                        <span id="copyBtnText">Copy</span>
                    </button>
                </div>
                <div class="p-6 bg-cyan-50/30">
                    <div id="aiContent" class="prose prose-sm prose-cyan max-w-none whitespace-pre-line text-slate-700 leading-relaxed">
                        </div>
                    <div class="mt-4 pt-4 border-t border-cyan-100 text-xs text-cyan-800 font-medium flex items-center gap-2">
                        <i data-lucide="alert-triangle" class="w-3 h-3 flex-shrink-0"></i>
                        <span>This is a support tool. Always file official logs for compliance.</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const _apiCfg = (typeof window !== "undefined" && window.IncidentReporterApiConfig) || {};
        const INCIDENT_API_ORIGIN = String(_apiCfg.apiOrigin);
        const INCIDENT_API_TOKEN = _apiCfg.apiToken;
        const HTML_ADVICE_VARIANT = "caregiver";
        function apiBase() {
            // Only use local dev server when running locally (file protocol or localhost)
            // if (typeof location === "undefined") return INCIDENT_API_ORIGIN;
            // const host = location.hostname;
            // if (location.protocol === "file:" || host === "localhost" || host === "127.0.0.1") {
            //     return "http://localhost:3000";
            // }
            return INCIDENT_API_ORIGIN;
        }

        // --- STATE & CONSTANTS ---
        let currentSeverity = 1;
        
        // Updated for Geriatric/Home Care Context
        const SEVERITY_DATA = {
            1: { desc: "Mild confusion, verbal agitation, refusal of activity", color: 'border-emerald-500 bg-emerald-50 text-emerald-700' },
            2: { desc: "Refusal of meds/food, sustained anxiety, non-compliance", color: 'border-lime-500 bg-lime-50 text-lime-700' },
            3: { desc: "Wandering/elopement risk, minor skin tear/bruise, verbal aggression", color: 'border-amber-500 bg-amber-50 text-amber-700' },
            4: { desc: "Unwitnessed fall (no injury), physical aggression, combative care", color: 'border-orange-500 bg-orange-50 text-orange-700' },
            5: { desc: "Fall with injury, medical emergency (911), severe abuse allegation", color: 'border-red-600 bg-red-50 text-red-700' }
        };

        const BASE_CLASS = "severity-btn border-slate-100 bg-slate-50 text-slate-500 hover:border-slate-300 relative flex flex-col items-center justify-center p-2 md:p-3 rounded-lg border-2 transition-all active:scale-95 touch-manipulation";

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        // --- FUNCTIONS ---
        function selectSeverity(level) {
            currentSeverity = level;
            
            // Update Description
            const data = SEVERITY_DATA[level];
            document.getElementById('severityDesc').innerText = `"${data.desc}"`;

            // Reset all buttons to base style
            for(let i=1; i<=5; i++) {
                const btn = document.getElementById(`sev-btn-${i}`);
                if (i === level) {
                     btn.className = BASE_CLASS.replace("border-slate-100 bg-slate-50 text-slate-500 hover:border-slate-300", data.color);
                } else {
                    btn.className = BASE_CLASS;
                }
            }
        }

        function toggleWitness() {
            const checkbox = document.getElementById('witnesses');
            checkbox.checked = !checkbox.checked;
        }

        async function copyToClipboard() {
            const content = document.getElementById('aiContent').innerText;
            const btnText = document.getElementById('copyBtnText');
            
            try {
                await navigator.clipboard.writeText(content);
                const originalText = btnText.innerText;
                btnText.innerText = "Copied!";
                setTimeout(() => {
                    btnText.innerText = originalText;
                }, 2000);
            } catch (err) {
                console.error('Failed to copy: ', err);
            }
        }

        // --- SUBMISSION LOGIC ---
        document.getElementById('incidentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 1. UI Loading State
            const btn = document.getElementById('submitBtn');
            const loader = btn.querySelector('.btn-loader');
            const icon = btn.querySelector('.btn-icon');
            const text = btn.querySelector('.btn-text');
            
            btn.disabled = true;
            loader.classList.remove('hidden');
            icon.classList.add('hidden');
            text.innerText = "Analyzing...";

            // 2. Gather Data
            const formData = {
                caregiverName: document.getElementById('caregiverName').value,
                clientName: document.getElementById('clientName').value,
                location: document.getElementById('location').value,
                severity: currentSeverity,
                witnesses: document.getElementById('witnesses').checked,
                details: document.getElementById('details').value
            };

            // 3. AI Generation
            try {
                const advice = await generateAIAdvice(formData);
                
                // Show Result
                const adviceSection = document.getElementById('adviceSection');
                const aiContent = document.getElementById('aiContent');
                
                aiContent.innerText = advice;
                adviceSection.classList.remove('hidden');
                
                // Scroll to result
                setTimeout(() => {
                    adviceSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);

            } catch (error) {
                alert("Error generating advice. Please check your internet connection and try again.");
                console.error(error);
            } finally {
                // Reset UI
                btn.disabled = false;
                loader.classList.add('hidden');
                icon.classList.remove('hidden');
                text.innerText = "Submit Report";
            }
        });

        async function generateAIAdvice(data) {
            try {
                const response = await fetch(apiBase() + "/api/ai/advice", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-incident-app": "incident-reporter",
                        Authorization: "Bearer " + INCIDENT_API_TOKEN,
                    },
                    body: JSON.stringify({ variant: HTML_ADVICE_VARIANT, payload: data }),
                });
                const result = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(result.error || response.statusText);
                }
                return result.advice || "Unable to generate advice.";
            } catch (e) {
                console.error("AI Fetch Error:", e);
                return "Service unavailable. Please rely on standard medical and facility protocols.";
            }
        }
    </script>
</body>
</html>
